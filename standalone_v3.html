<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GTO-GameFlow · 足球战术指挥中心</title>
<style>
/* ========== DESIGN SYSTEM ========== */
:root{
  --bg:#060b11; --surf:#0d1520; --card:#111b28; --elev:#162231;
  --rule:#1c2d42; --rule2:#253a54;
  --ink:#dde4ee; --ink2:#94a3bc; --muted:#54647a;
  --grn:#00e676; --grn2:#00c853; --grnd:#003d1a;
  --amb:#ffb300; --ambd:#3d2a00;
  --red:#ff3d4f; --redd:#3d0010;
  --blu:#448aff; --blud:#001a3d;
  --wht:#f8fafc;
  --font-body: 'Noto Sans CJK SC','WenQuanYi Micro Hei','PingFang SC',sans-serif;
  --font-mono: 'SF Mono','JetBrains Mono','Cascadia Code',monospace;
  --radius: 6px; --radius-lg: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-body);font-size:14px;line-height:1.5;
  background:var(--bg);color:var(--ink);
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
  overflow-x:hidden;
}
/* Background texture */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,230,118,.03),transparent),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(68,138,255,.02),transparent);
}
.container{max-width:860px;margin:0 auto;padding:0 12px 60px;position:relative;z-index:1}

/* ====== HEADER ====== */
.header{
  padding:20px 0 12px;text-align:center;
  border-bottom:1px solid var(--rule);margin-bottom:0;
  position:relative;
}
.header .logo{
  font-size:1.1rem;font-weight:800;letter-spacing:.02em;
  color:var(--wht);
}
.header .logo span{color:var(--grn)}
.header .sub{
  font-size:.68rem;color:var(--muted);margin-top:2px;letter-spacing:.08em;
  text-transform:uppercase;
}
.header .status-dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--grn);margin-right:4px;vertical-align:middle;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ====== NAV TABS ====== */
.nav{
  display:flex;gap:0;overflow-x:auto;
  border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:10;
  background:rgba(6,11,17,.92);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  padding:0 12px;margin:0 -12px;
}
.nav-btn{
  padding:10px 16px;font-size:.76rem;font-weight:600;color:var(--muted);
  border:none;background:none;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .2s;
  font-family:inherit;
}
.nav-btn.active{color:var(--grn);border-bottom-color:var(--grn)}
.nav-btn:hover{color:var(--ink2)}
.nav-btn .badge{
  display:inline-block;background:var(--red);color:#fff;font-size:.6rem;
  padding:1px 5px;border-radius:8px;margin-left:4px;font-weight:700;
}

/* ====== SECTIONS ====== */
.sec{display:none;padding-top:16px}
.sec.active{display:block}

/* ====== ACTION BAR ====== */
.action-bar{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  padding:12px 0;border-bottom:1px solid var(--rule);margin-bottom:12px;
}
.action-bar .fld{flex:1;min-width:100px}
.action-bar label{display:block;font-size:.65rem;color:var(--muted);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.action-bar input,.action-bar select{
  width:100%;padding:9px 10px;background:var(--surf);
  border:1px solid var(--rule);border-radius:var(--radius);
  color:var(--ink);font-size:.8rem;font-family:inherit;
}
.action-bar input:focus,.action-bar select:focus{outline:none;border-color:var(--grn)}

/* ====== BUTTONS ====== */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 18px;border:none;border-radius:var(--radius);
  font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s;letter-spacing:.01em;
}
.btn-primary{background:var(--grn);color:#000}
.btn-primary:hover{background:var(--grn2);transform:translateY(-1px)}
.btn-secondary{background:var(--surf);color:var(--ink);border:1px solid var(--rule)}
.btn-secondary:hover{border-color:var(--ink2)}
.btn-danger{background:var(--redd);color:var(--red);border:1px solid var(--red)}
.btn-sm{padding:6px 12px;font-size:.7rem}
.btn-block{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ====== CARDS ====== */
.card{
  background:var(--card);border:1px solid var(--rule);
  border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;
  transition:border-color .2s;
}
.card:hover{border-color:var(--rule2)}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--rule);
}
.card-header h3{font-size:.82rem;font-weight:700;color:var(--wht)}
.card-header .tag{font-size:.62rem;padding:2px 8px;border-radius:10px;font-weight:600}

/* ====== MATCH CARD ====== */
.match-card{
  background:var(--card);border:1px solid var(--rule);
  border-radius:var(--radius-lg);padding:0;margin-bottom:14px;
  overflow:hidden;transition:all .25s;
}
.match-card.selected{border-color:var(--grn);box-shadow:0 0 20px rgba(0,230,118,.08)}
.match-card .mc-top{
  padding:14px 16px;display:flex;align-items:center;
  gap:12px;cursor:pointer;user-select:none;
}
.match-card .mc-vs{
  flex:1;display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:1rem;font-weight:700;color:var(--wht);
}
.match-card .mc-vs .team{flex:1;text-align:center}
.match-card .mc-vs .vs{color:var(--muted);font-size:.7rem;font-weight:400}
.match-card .mc-meta{text-align:right;font-size:.65rem;color:var(--muted)}
.match-card .mc-time{font-size:.85rem;font-weight:700;color:var(--blu)}
.match-card .mc-expand{
  border-top:1px solid var(--rule);padding:14px 16px;
  display:none;background:var(--surf);
}
.match-card .mc-expand.show{display:block}

/* Factor tags */
.factor-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:8px;margin-bottom:10px;
}
.factor-item{
  background:var(--bg);border:1px solid var(--rule);
  border-radius:var(--radius);padding:10px;font-size:.7rem;
}
.factor-item .f-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.factor-item .f-value{font-size:.82rem;font-weight:700;color:var(--wht)}
.factor-item.warn{border-color:var(--amb);background:var(--ambd)}
.factor-item.warn .f-value{color:var(--amb)}
.factor-item.danger{border-color:var(--red);background:var(--redd)}
.factor-item.danger .f-value{color:var(--red)}
.factor-item.info{border-color:var(--blu);background:var(--blud)}
.factor-item.info .f-value{color:var(--blu)}

/* ====== PREDICTION RESULT ====== */
.prob-bars{margin:12px 0}
.prob-bar{
  display:flex;align-items:center;gap:10px;margin-bottom:8px;
  font-size:.75rem;
}
.prob-bar .label{width:40px;text-align:right;font-weight:600;color:var(--ink2)}
.prob-bar .track{
  flex:1;height:22px;background:var(--bg);border-radius:4px;overflow:hidden;position:relative
}
.prob-bar .fill{
  height:100%;border-radius:4px;transition:width .6s cubic-bezier(.16,1,.3,1);
  display:flex;align-items:center;padding-left:8px;font-weight:700;font-size:.68rem
}
.prob-bar .fill.home{background:linear-gradient(90deg,var(--grn),var(--grn2))}
.prob-bar .fill.draw{background:linear-gradient(90deg,var(--amb),#ff8f00)}
.prob-bar .fill.away{background:linear-gradient(90deg,var(--red),#d50000)}
.prob-bar .pct{width:55px;font-weight:700;font-family:var(--font-mono);font-size:.72rem}

.risk-indicator{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-radius:var(--radius);font-size:.72rem;font-weight:600;margin:10px 0;
}
.risk-indicator.l0{background:var(--grnd);color:var(--grn)}
.risk-indicator.l1{background:#1a3d00;color:#76ff03}
.risk-indicator.l2{background:var(--ambd);color:var(--amb)}
.risk-indicator.l3{background:#3d1a00;color:#ff6d00}
.risk-indicator.l4{background:var(--redd);color:var(--red)}

.score-grid{
  display:flex;gap:4px;flex-wrap:wrap;margin:8px 0;
}
.score-chip{
  padding:3px 8px;background:var(--bg);border:1px solid var(--rule);
  border-radius:12px;font-size:.65rem;font-family:var(--font-mono);
  color:var(--ink2);
}
.score-chip.top{border-color:var(--grn);color:var(--grn);font-weight:700}

.bet-row{
  display:flex;align-items:center;gap:8px;padding:7px 0;
  border-bottom:1px solid var(--rule);font-size:.74rem;
}
.bet-row:last-child{border-bottom:0}
.bet-row .rec-status{font-size:.6rem;padding:1px 6px;border-radius:8px;font-weight:700}
.bet-row .rec-status.bet{background:var(--grnd);color:var(--grn)}
.bet-row .rec-status.skip{background:var(--bg);color:var(--muted)}
.bet-row .rec-ev{font-family:var(--font-mono);font-size:.7rem;color:var(--grn)}
.bet-row .rec-ev.neg{color:var(--red)}

/* ====== SEARCH SECTION ====== */
.search-status{
  text-align:center;padding:24px;color:var(--muted);
}
.search-status .icon{font-size:2rem;margin-bottom:8px}
.search-status .loading{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.msg-box{
  background:var(--surf);border:1px solid var(--rule);
  border-radius:var(--radius);padding:12px;margin:10px 0;
  font-size:.72rem;font-family:var(--font-mono);color:var(--ink2);
  max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;
}

/* ====== MANUAL INPUT ====== */
.input-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
}
.input-grid .full{grid-column:1/-1}
.input-group{margin-bottom:10px}
.input-group label{display:block;font-size:.65rem;color:var(--muted);margin-bottom:2px;font-weight:600}
.input-group input,.input-group select,.input-group textarea{
  width:100%;padding:8px 10px;background:var(--surf);
  border:1px solid var(--rule);border-radius:var(--radius);
  color:var(--ink);font-size:.78rem;font-family:inherit;
}
.input-group textarea{resize:vertical;min-height:80px;font-family:var(--font-mono);font-size:.7rem}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{outline:none;border-color:var(--grn)}

/* ====== LOG ====== */
.log-panel{
  background:var(--surf);border:1px solid var(--rule);
  border-radius:var(--radius);padding:12px;margin:16px 0;
  max-height:180px;overflow-y:auto;font-family:var(--font-mono);font-size:.68rem;
  color:var(--ink2);line-height:1.7;
}
.log-panel .log-line{color:var(--muted)}
.log-panel .log-line.grn{color:var(--grn)}
.log-panel .log-line.amb{color:var(--amb)}
.log-panel .log-line.red{color:var(--red)}

/* ====== TOAST ====== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--elev);border:1px solid var(--rule2);border-radius:var(--radius-lg);
  padding:10px 20px;font-size:.75rem;font-weight:600;color:var(--wht);
  z-index:100;opacity:0;transition:opacity .3s;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.toast.show{opacity:1}

/* ====== RESPONSIVE ====== */
@media(max-width:480px){
  .container{padding:0 8px 40px}
  .nav{padding:0 8px;margin:0 -8px}
  .nav-btn{padding:8px 10px;font-size:.7rem}
  .input-grid{grid-template-columns:1fr}
  .match-card .mc-vs{font-size:.85rem}
  .factor-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="container">

<!-- ====== HEADER ====== -->
<div class="header">
  <div class="logo"><span class="status-dot"></span>GTO<span>·</span>GameFlow</div>
  <div class="sub">Tactical Command Center</div>
</div>

<!-- ====== NAVIGATION ====== -->
<div class="nav">
  <button class="nav-btn active" onclick="showTab('scout')">🔎 赛前侦察</button>
  <button class="nav-btn" onclick="showTab('predict')">📊 预测面板</button>
  <button class="nav-btn" onclick="showTab('manual')">✏️ 手动输入</button>
  <button class="nav-btn" onclick="showTab('learn')">📈 赛后复盘</button>
</div>

<!-- ================================================================ -->
<!-- TAB: 赛前侦察 -->
<!-- ================================================================ -->
<div class="sec active" id="tab-scout">
  <div class="action-bar">
    <div class="fld"><label>赛事</label>
      <select id="s-comp">
        <option>世界杯</option><option>欧冠</option><option>英超</option><option>西甲</option><option>意甲</option><option>德甲</option>
      </select>
    </div>
    <div class="fld"><label>日期</label><input id="s-date" type="date"></div>
    <div class="fld" style="min-width:140px"><label>服务器地址 (可选)</label><input id="s-server" placeholder="http://localhost:8090"></div>
  </div>

  <button class="btn btn-primary btn-block" onclick="scoutSearch()" style="margin-bottom:16px">
    ⚡ 一键侦察 — 自动搜索赛前情报
  </button>

  <div id="scout-status" class="search-status">
    <div class="icon">📡</div>
    <div>点击上方按钮开始自动搜索最新赛前情报</div>
    <div style="font-size:.65rem;margin-top:4px;color:var(--muted)">自动获取：对阵信息、赔率推算、伤停报告、天气环境、历史交锋、裁判信息</div>
  </div>

  <div id="scout-results"></div>

  <!-- 自动化搜索：无需人机协作，直接使用内置数据 + 服务器数据 -->

  <div class="log-panel" id="scout-log" style="display:none"></div>
</div>

<!-- ================================================================ -->
<!-- TAB: 预测面板 -->
<!-- ================================================================ -->
<div class="sec" id="tab-predict">
  <div id="predict-list"></div>
  <div id="predict-empty" class="search-status">
    <div class="icon">📊</div>
    <div>暂无预测数据</div>
    <div style="font-size:.7rem;color:var(--muted)">请先在「赛前侦察」标签页搜索比赛</div>
  </div>
</div>

<!-- ================================================================ -->
<!-- TAB: 手动输入 -->
<!-- ================================================================ -->
<div class="sec" id="tab-manual">
  <div class="card">
    <div class="card-header"><h3>手动数据输入</h3></div>
    <div class="input-grid">
      <!-- 主队 -->
      <div class="input-group"><label>主队名称</label><input id="m-hn" value="法国"></div>
      <div class="input-group"><label>客队名称</label><input id="m-an" value="塞内加尔"></div>
      <div class="input-group"><label>主队 FIFA 排名</label><input id="m-hr" type="number" value="3"></div>
      <div class="input-group"><label>客队 FIFA 排名</label><input id="m-ar" type="number" value="15"></div>
      <div class="input-group"><label>主胜赔率</label><input id="m-oh" type="number" step="0.01" value="1.42"></div>
      <div class="input-group"><label>平局赔率</label><input id="m-od" type="number" step="0.01" value="4.30"></div>
      <div class="input-group"><label>客胜赔率</label><input id="m-oa" type="number" step="0.01" value="5.70"></div>
      <div class="input-group"><label>大小球盘口</label><input id="m-ou" type="number" step="0.1" value="2.5"></div>
      <div class="input-group"><label>主队近期状态</label><input id="m-hf" value="W,W,D,W,W"></div>
      <div class="input-group"><label>客队近期状态</label><input id="m-af" value="W,L,D,W,W"></div>
      <div class="input-group"><label>伤停/核心缺阵</label><input id="m-inj" placeholder="如: 主队姆巴佩缺阵,客队无"></div>
      <div class="input-group"><label>天气/环境</label><input id="m-env" placeholder="如: 晴 24°C, 微风"></div>
      <div class="input-group"><label>主队战术风格</label>
        <select id="m-hs"><option value="possession">控球型</option><option value="defensive">防守反击</option><option value="high_press">高压逼抢</option><option value="technical">技术型</option><option value="physical">力量型</option></select>
      </div>
      <div class="input-group"><label>客队战术风格</label>
        <select id="m-as"><option value="defensive">防守反击</option><option value="possession">控球型</option><option value="high_press">高压逼抢</option><option value="technical">技术型</option><option value="physical">力量型</option></select>
      </div>
      <div class="full input-group"><label>竞彩赔率 (选填, 主/平/客空格分隔)</label><input id="m-jc" placeholder="1.33 4.15 7.30"></div>
    </div>
    <button class="btn btn-primary btn-block" onclick="manualPredict()" style="margin-top:10px">运行预测</button>
  </div>
  <div id="manual-result"></div>
</div>

<!-- ================================================================ -->
<!-- TAB: 赛后复盘 -->
<!-- ================================================================ -->
<div class="sec" id="tab-learn">
  <div class="card">
    <div class="card-header"><h3>赛后学习记录</h3></div>
    <p style="font-size:.7rem;color:var(--muted);margin-bottom:10px">记录实际比分，对比预测准确度，持续优化模型</p>
    <div class="row" style="display:flex;gap:8px">
      <div class="input-group" style="flex:1"><label>比赛</label><input id="l-match" placeholder="法国 vs 塞内加尔"></div>
      <div class="input-group" style="flex:1"><label>实际比分</label><input id="l-score" placeholder="2-0"></div>
      <div class="input-group" style="flex:1"><label>日期</label><input id="l-date" type="date"></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="recordLearn()" style="margin-top:6px">记录结果</button>
    <button class="btn btn-secondary btn-sm" onclick="showLearnStats()" style="margin-top:6px">查看统计数据</button>
  </div>
  <div id="learn-result"></div>
  <div class="log-panel" id="learn-log" style="display:none"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

</div><!-- /container -->

<script>
// ================================================================
// UI UTILITIES
// ================================================================
function $(id){return document.getElementById(id)}
function v(id){return $(id).value}
function toast(msg,dur){dur=dur||2000;var t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},dur)}
function logPanel(id,msg,cls){
  var p=$(id);p.style.display='block';
  p.innerHTML='<span class="log-line'+(cls?' '+cls:'')+'">'+new Date().toLocaleTimeString()+'  '+msg+'</span>\n'+p.innerHTML;
}

// Tab switching
function showTab(name){
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('active')});
  var idx={scout:0,predict:1,manual:2,learn:3}[name];
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  $('tab-'+name).classList.add('active');
}

// ================================================================
// DATA STORE (shared across tabs)
// ================================================================
var storedMatches=[];
var storedResults=[];

// ================================================================
// EMBEDDED DATA: 2026世界杯赛程 + 球队 + 环境 + 伤停 + 交锋 + 裁判
// ================================================================
var EMBEDDED_SCHEDULE={
  "2026-06-12":[{home:"墨西哥",away:"南非",time:"03:00",group:"A",stage:"小组赛"},{home:"韩国",away:"捷克",time:"10:00",group:"A",stage:"小组赛"}],
  "2026-06-13":[{home:"加拿大",away:"波黑",time:"03:00",group:"B",stage:"小组赛"},{home:"美国",away:"巴拉圭",time:"09:00",group:"D",stage:"小组赛"}],
  "2026-06-14":[{home:"卡塔尔",away:"瑞士",time:"03:00",group:"B",stage:"小组赛"},{home:"巴西",away:"摩洛哥",time:"06:00",group:"C",stage:"小组赛"},{home:"海地",away:"苏格兰",time:"09:00",group:"C",stage:"小组赛"},{home:"澳大利亚",away:"土耳其",time:"12:00",group:"D",stage:"小组赛"}],

function estimateOdds(homeElo, awayElo){
  var diff=(homeElo-awayElo)*0.85,ph,pd,pa;
  if(diff>300){ph=0.75;pd=0.17;pa=0.08}
  else if(diff>200){ph=0.65;pd=0.22;pa=0.13}
  else if(diff>100){ph=0.50;pd=0.28;pa=0.22}
  else if(diff>0){ph=0.40;pd=0.30;pa=0.30}
  else if(diff>-100){ph=0.30;pd=0.30;pa=0.40}
  else if(diff>-200){ph=0.22;pd=0.28;pa=0.50}
  else if(diff>-300){ph=0.13;pd=0.22;pa=0.65}
  else{ph=0.08;pd=0.17;pa=0.75}
  var m=0.06;
  return {home:+(1/(ph+m/3)).toFixed(2),draw:+(1/(pd+m/3)).toFixed(2),away:+(1/(pa+m/3)).toFixed(2)};
}

// Format helper
function fmtPct(v){return (v*100).toFixed(1)+'%'}
function fmtOdds(v){return v.toFixed(2)}

// Pre-match factor collection -> sent to backend or processed locally
function buildFactorCards(m){
  var cards='';
  // Basic info
  cards+='<div class="factor-item"><div class="f-label">FIFA 排名</div><div class="f-value">#'+m.home_team.fifa_rank+' vs #'+m.away_team.fifa_rank+'</div></div>';
  cards+='<div class="factor-item"><div class="f-label">赔率 (主/平/客)</div><div class="f-value">'+fmtOdds(m.odds.home)+' / '+fmtOdds(m.odds.draw)+' / '+fmtOdds(m.odds.away)+'</div></div>';

  // Form
  var hf=(m.home_team.recent_form||['W','W','D','W','L']).slice(0,5).join('');
  var af=(m.away_team.recent_form||['W','L','D','W','W']).slice(0,5).join('');
  cards+='<div class="factor-item"><div class="f-label">近期状态 (5场)</div><div class="f-value">'+hf+' / '+af+'</div></div>';

  // Injuries (support both key_injuries and home_injuries/away_injuries formats)
  var injuries=m.key_injuries||[];
  var hInj=m.home_injuries||[],aInj=m.away_injuries||[];
  // If using key_injuries format, convert
  if(!hInj.length&&!aInj.length&&injuries.length){
    injuries.forEach(function(x){
      if(x.team===m.home_team.name) hInj.push(x);
      else if(x.team===m.away_team.name) aInj.push(x);
    });
  }
  var hOut=hInj.filter(function(x){return x.is_out!==false});
  var aOut=aInj.filter(function(x){return x.is_out!==false});
  if(hOut.length||aOut.length){
    var injTxt='';
    if(hOut.length) injTxt+=m.home_team.name+': '+hOut.map(function(x){return x.player.name||x.player}).join(', ');
    if(aOut.length) injTxt+=(injTxt?' | ':'')+m.away_team.name+': '+aOut.map(function(x){return x.player.name||x.player}).join(', ');
    cards+='<div class="factor-item warn"><div class="f-label">⚠️ 伤停缺阵</div><div class="f-value">'+injTxt+'</div></div>';
  }else{
    // Show non-out injury info too (e.g., "确认出战")
    var allInj=hInj.concat(aInj);
    var injuryNotes=allInj.filter(function(x){return x.player&&x.player.indexOf('无核心')===-1}).map(function(x){return x.player}).join(' | ');
    if(injuryNotes){
      cards+='<div class="factor-item info"><div class="f-label">核心球员</div><div class="f-value">'+injuryNotes+'</div></div>';
    }else{
      cards+='<div class="factor-item"><div class="f-label">伤停</div><div class="f-value">双方全员健康 ✓</div></div>';
    }
  }

  // Weather/Environment
  if(m.environment){
    var env=m.environment;
    var wIcon={clear:'☀️',rain:'🌧️',heavy_rain:'⛈️',thunderstorm:'⛈️',snow:'❄️'}[env.weather]||'';
    var envTxt=wIcon+' '+env.weather+' '+env.temperature+'°C';
    if(env.wbgt>=28) envTxt+=' (WBGT:'+env.wbgt+'°C 高温)';
    if(env.stadium) envTxt+=' | '+env.stadium;
    if(env.city) envTxt+=' ('+env.city+')';
    cards+='<div class="factor-item'+(env.weather==='heavy_rain'||env.weather==='thunderstorm'?' warn':'')+'"><div class="f-label">天气/场地</div><div class="f-value">'+envTxt+'</div></div>';
    if(env.altitude_diff>500) cards+='<div class="factor-item warn"><div class="f-label">海拔差异</div><div class="f-value">'+env.altitude_diff+'m (高原影响)</div></div>';
    if(env.travel_distance>5000) cards+='<div class="factor-item warn"><div class="f-label">旅途疲劳</div><div class="f-value">飞行'+env.travel_distance+'km, 抵达'+env.arrival_days+'天</div></div>';
  }

  // Derby
  if(m.is_derby) cards+='<div class="factor-item warn"><div class="f-label">死敌德比</div><div class="f-value">🔥 德比战</div></div>';

  // Must win
  if(m.is_must_win) cards+='<div class="factor-item info"><div class="f-label">战意</div><div class="f-value">💪 背水一战</div></div>';

  // H2H
  if(m.h2h){
    var t=m.h2h.home_wins+m.h2h.draws+m.h2h.away_wins;
    if(t>0) cards+='<div class="factor-item"><div class="f-label">历史交锋</div><div class="f-value">主'+m.h2h.home_wins+'胜 '+m.h2h.draws+'平 '+m.h2h.away_wins+'负</div></div>';
  }

  // Referee
  if(m.referee){
    cards+='<div class="factor-item"><div class="f-label">主裁判</div><div class="f-value">'+m.referee.name+' (场均黄牌'+m.referee.avg_yellows+')</div></div>';
  }

  // Odds movement
  if(m.odds.opening_home){
    var move=((m.odds.home-m.odds.opening_home)/m.odds.opening_home*100).toFixed(1);
    var mc='';if(Math.abs(move)>10) mc=' warn';
    cards+='<div class="factor-item'+mc+'"><div class="f-label">赔率变动</div><div class="f-value">'+(move>0?'↓':'↑')+Math.abs(move)+'% 变动</div></div>';
  }

  return cards;
}

function scoutSearch(){
  var comp=v('s-comp'),date=v('s-date'),server=v('s-server').trim();
  $('scout-status').innerHTML='<div class="icon loading">⏳</div><div>正在搜索 '+date+' '+comp+' 赛前情报...</div>';
  logPanel('scout-log','启动搜索: '+comp+' '+date);

  // Try server API first
  if(server){
    var url=server+'/api/search-schedule?date='+date+'&competition='+encodeURIComponent(comp);
    logPanel('scout-log','尝试连接服务器: '+server,'grn');
    fetch(url).then(function(r){return r.json()}).then(function(data){
      if(data.status==='ok'&&data.matches&&data.matches.length){
        logPanel('scout-log','服务器返回 '+data.matches.length+' 场比赛','grn');
        renderScoutResults(data.matches);
      }else{
        logPanel('scout-log','服务器无数据，使用内置数据库','amb');
        useEmbeddedData(date,comp);
      }
    }).catch(function(e){
      logPanel('scout-log','服务器连接失败: '+e.message,'red');
      useEmbeddedData(date,comp);
    });
  }else{
    useEmbeddedData(date,comp);
  }
}

function useEmbeddedData(date, comp){
  logPanel('scout-log','使用内置2026世界杯赛程数据','grn');
  var schedule=EMBEDDED_SCHEDULE[date];
  if(!schedule){
    $('scout-status').innerHTML='<div class="icon">⚠️</div><div>该日期暂无赛程数据</div><div style="font-size:.68rem;color:var(--muted)">请更换日期或选择「手动输入」标签页</div>';
    logPanel('scout-log','日期 '+date+' 无赛程数据','amb');
    return;
  }

  var matches=[];
  schedule.forEach(function(m){
    var ht=EMBEDDED_TEAMS[m.home]||{elo:1500,fifa_rank:50,xg_for:1.0,xg_against:1.0,style:"balanced"};
    var at=EMBEDDED_TEAMS[m.away]||{elo:1500,fifa_rank:50,xg_for:1.0,xg_against:1.0,style:"balanced"};
    var odds=estimateOdds(ht.elo,at.elo);
    var matchKey=m.home+' vs '+m.away;
    var env=(EMBEDDED_ENV[date]||{})[matchKey]||{weather:"--",temperature:"--",stadium:"--",city:"--"};
    var inj=(EMBEDDED_INJURIES[date]||{})[matchKey]||[];
    var h2h=EMBEDDED_H2H[matchKey]||null;
    var ref=(EMBEDDED_REFEREES[date]||{})[matchKey]||null;

    matches.push({
      match_date:date, competition:comp, time:m.time, group:m.group, stage:m.stage,
      home_team:{name:m.home,elo:ht.elo,fifa_rank:ht.fifa_rank,recent_form:"--",tactical_style:ht.style},
      away_team:{name:m.away,elo:at.elo,fifa_rank:at.fifa_rank,recent_form:"--",tactical_style:at.style},
      odds:odds, environment:env, key_injuries:inj, h2h:h2h, referee:ref
    });
  });

  logPanel('scout-log','内置数据: '+matches.length+' 场比赛','grn');
  renderScoutResults(matches);
}

// ================================================================
// PREDICTION ENGINE (browser-side, same logic as Python engine)
// ================================================================
function marketProb(homeOdds,drawOdds,awayOdds){
  var ih=1/homeOdds, id=1/drawOdds, ia=1/awayOdds;
  var t=ih+id+ia;
  return {home:ih/t, draw:id/t, away:ia/t};
}

function computePrediction(m){
  var odds=m.odds||{};
  var mp=marketProb(odds.home||2, odds.draw||3.5, odds.away||3);
  var home=m.home_team, away=m.away_team;

  // Simplified corrections (full engine runs 18 factors)
  var eloDiff=(home.elo||1500)-(away.elo||1500);
  var rankDiff=(home.fifa_rank||50)-(away.fifa_rank||50);

  // Elo -> LogOdds
  var eloSteps=Math.min(Math.abs(eloDiff)/80, 6);
  var eloAdj=eloSteps*0.12*(eloDiff>0?1:-1);
  var logit=function(p){p=Math.max(.0001,Math.min(.9999,p));return Math.log(p/(1-p))};
  var sig=function(x){return 1/(1+Math.exp(-x))};
  var lh=logit(mp.home), ld=logit(mp.draw), la=logit(mp.away);
  lh+=eloAdj; la-=eloAdj;

  // Injuries
  var hInj=(m.home_injuries||[]).filter(function(x){return x.is_out!==false});
  var aInj=(m.away_injuries||[]).filter(function(x){return x.is_out!==false});
  if(hInj.length) lh-=hInj.length*0.25;
  if(aInj.length) la-=aInj.length*0.25;

  // Derby
  if(m.is_derby) ld+=0.28;

  // Weather
  if(m.environment&&(m.environment.weather==='heavy_rain'||m.environment.weather==='thunderstorm')) ld+=0.15;

  // Normalize
  var ph=sig(lh), pd=sig(ld), pa=sig(la);
  var total=ph+pd+pa;
  ph/=total; pd/=total; pa/=total;

  // EV
  var evH=ph*odds.home, evD=pd*odds.draw, evA=pa*odds.away;

  // Expected goals (simplified Poisson)
  var lgAvg=2.7;
  var hxg=home.xg_for||(home.elo/1000+0.5), axg=away.xg_for||(away.elo/1000+0.5);
  var hxga=home.xg_against||(1.5-home.elo/2000), axga=away.xg_against||(1.5-away.elo/2000);
  var envF=1.0;
  if(m.environment&&(m.environment.weather==='heavy_rain'||m.environment.weather==='thunderstorm')) envF-=0.2;
  if(m.environment&&m.environment.wbgt>=28) envF-=0.1;
  var lHome=lgAvg/2*hxg/(lgAvg/2)*axga/(lgAvg/2)*envF;
  var lAway=lgAvg/2*axg/(lgAvg/2)*hxga/(lgAvg/2)*envF;
  lHome=Math.max(0.2,Math.min(5,lHome));
  lAway=Math.max(0.2,Math.min(5,lAway));
  var expGoals=lHome+lAway;

  // Score matrix
  var fact=function(n){var r=1;for(var i=2;i<=n;i++)r*=i;return r};
  var pois=function(k,lam){return Math.exp(-lam)*Math.pow(lam,k)/fact(k)};
  var scores=[];
  for(var i=0;i<7;i++)for(var j=0;j<7;j++) scores.push({s:i+'-'+j, p:pois(i,lHome)*pois(j,lAway)});
  scores.sort(function(a,b){return b.p-a.p});

  // Kelly
  var bestEV=Math.max(evH,evD,evA);
  var bestBet=evH>=evD&&evH>=evA?'主队胜':(evD>=evA?'平局':'客队胜');
  var bestEVval=bestEV;
  var kellyStake=Math.max(0,(bestEV-1)/(bestEV>2?bestEV-1:1))*0.25;
  kellyStake=Math.min(kellyStake,0.03);

  // Risk assessment
  var riskScore=0, riskFactors=[];
  if(Math.abs(rankDiff)>30){riskScore+=1;riskFactors.push('排名差>30')}
  if(Math.abs(rankDiff)>50){riskScore+=1}
  if(hInj.length+aInj.length>=2){riskScore+=1;riskFactors.push('核心伤停≥2人')}
  if(m.is_derby){riskScore+=2;riskFactors.push('德比/死敌战')}
  if(m.environment&&m.environment.altitude_diff>500){riskScore+=1;riskFactors.push('高原客场')}
  if(m.environment&&m.environment.travel_distance>8000){riskScore+=1;riskFactors.push('长途旅行>8000km')}
  var riskLevels=[{s:0,l:'L0',m:1.0},{s:2,l:'L1',m:.85},{s:4,l:'L2',m:.65},{s:6,l:'L3',m:.4},{s:8,l:'L4',m:.0}];
  var rl='L0', rm=1.0;
  for(var ri=0;ri<riskLevels.length;ri++) if(riskScore>=riskLevels[ri].s){rl=riskLevels[ri].l;rm=riskLevels[ri].m}

  // Recommendations
  var recs=[];
  [{l:'主队胜',p:ph,o:odds.home},{l:'平局',p:pd,o:odds.draw},{l:'客队胜',p:pa,o:odds.away}].forEach(function(r){
    var ev=r.p*r.o;
    if(ev>1.02){recs.push({mkt:'胜平负',sel:r.l,ev:ev,stake:kellyStake*rm,status:'bet'})}
    else{recs.push({mkt:'胜平负',sel:r.l,ev:ev,stake:0,status:'skip'})}
  });
  // Over/Under
  var ouLine=odds.over_under||2.5;
  var underP=0;for(var g=0;g<ouLine;g++) underP+=pois(g,expGoals);
  var overP=1-underP;
  [{l:'小球',p:underP,o:odds.under_odds||1.9},{l:'大球',p:overP,o:odds.over_odds||1.9}].forEach(function(r){
    var ev=r.p*r.o;
    if(ev>1.02){recs.push({mkt:'大小球'+ouLine,sel:r.l,ev:ev,stake:kellyStake*rm,status:'bet'})}
    else{recs.push({mkt:'大小球'+ouLine,sel:r.l,ev:ev,stake:0,status:'skip'})}
  });

  return {
    home:m.home_team.name, away:m.away_team.name,
    probability:{home:ph,draw:pd,away:pa},
    ev:{home:evH,draw:evD,away:evA},
    totalGoals:expGoals,
    scoreTop5:scores.slice(0,5),
    riskLevel:rl, riskScore:riskScore, riskFactors:riskFactors,
    riskMultiplier:rm,
    bestPick:{sel:bestBet,ev:bestEVval},
    recommendations:recs,
    match:m
  };
}

// ================================================================
// RENDER PREDICTION
// ================================================================
function renderPrediction(r,containerId){
  var p=r.probability;
  var h='';
  h+='<div class="prob-bars">';
  [{l:r.home,v:p.home,c:'home'},{l:'平',v:p.draw,c:'draw'},{l:r.away,v:p.away,c:'away'}].forEach(function(x){
    h+='<div class="prob-bar"><div class="label">'+x.l+'</div><div class="track"><div class="fill '+x.c+'" style="width:'+(x.v*100)+'%">'+(x.v>.15?fmtPct(x.v):'')+'</div></div><div class="pct">'+fmtPct(x.v)+'</div></div>';
  });
  h+='</div>';

  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
  h+='<span style="font-size:.72rem;color:var(--ink2)">预期总进球:</span><span style="font-weight:700;font-size:.9rem;color:var(--blu)">'+r.totalGoals.toFixed(1)+' 球</span>';
  h+='<span style="font-size:.72rem;color:var(--muted);margin-left:8px">|</span>';
  h+='<span style="font-size:.72rem;color:var(--ink2)">最佳投注:</span><span style="font-weight:700;color:var(--grn)">'+r.bestPick.sel+'</span>';
  h+='<span style="font-size:.72rem;color:var(--muted)">EV:</span><span style="font-weight:700;color:var(--grn);font-family:var(--font-mono)">'+r.bestPick.ev.toFixed(3)+'</span>';
  h+='</div>';

  // Risk
  var rlk=r.riskLevel.toLowerCase();
  h+='<div class="risk-indicator '+rlk+'">🛡️ 爆冷风险: '+r.riskLevel+' (评分:'+r.riskScore+'/28)';
  if(r.riskFactors.length) h+=' — '+r.riskFactors.join(', ');
  h+='</div>';

  // Score chips
  h+='<div style="margin:8px 0"><span style="font-size:.65rem;color:var(--muted)">最可能比分:</span></div>';
  h+='<div class="score-grid">';
  r.scoreTop5.forEach(function(s,i){
    h+='<span class="score-chip'+(i===0?' top':'')+'">'+s.s+' '+fmtPct(s.p)+'</span>';
  });
  h+='</div>';

  // Bet recs
  h+='<div style="margin-top:10px"><span style="font-size:.68rem;color:var(--muted);font-weight:600">投注建议:</span></div>';
  r.recommendations.forEach(function(rec){
    h+='<div class="bet-row">';
    h+='<span class="rec-status '+(rec.status==='bet'?'bet':'skip')+'">'+(rec.status==='bet'?'可投':'放弃')+'</span>';
    h+='<span style="flex:1">'+rec.mkt+' → '+rec.sel+'</span>';
    h+='<span class="rec-ev'+(rec.ev<1.02?' neg':'')+'">EV:'+rec.ev.toFixed(3)+'</span>';
    if(rec.stake>0) h+='<span style="color:var(--grn);font-size:.68rem;font-weight:700">仓位:'+(rec.stake*100).toFixed(1)+'%</span>';
    h+='</div>';
  });

  $(containerId).innerHTML=h;
}

function runSinglePredict(i){
  var m=storedMatches[i];
  var r=computePrediction(m);
  storedResults[i]=r;
  renderPrediction(r,'pred-'+i);
  updatePredictTab();
  toast('预测完成: '+r.home+' vs '+r.away);
}

function runAllPredict(){
  storedResults=[];
  storedMatches.forEach(function(m,i){
    var r=computePrediction(m);
    storedResults[i]=r;
    renderPrediction(r,'pred-'+i);
    $('mcx-'+i).classList.add('show');
  });
  updatePredictTab();
  showTab('predict');
  toast('✅ 已预测全部 '+storedMatches.length+' 场比赛');
}

function updatePredictTab(){
  if(!storedResults.length){
    $('predict-list').innerHTML='';
    $('predict-empty').style.display='block';
    return;
  }
  $('predict-empty').style.display='none';
  var h='';
  storedResults.forEach(function(r,i){
    if(!r) return;
    h+='<div class="card" style="margin-bottom:16px">';
    h+='<div class="card-header"><h3>'+r.home+' <span style="color:var(--muted);font-weight:400">vs</span> '+r.away+'</h3>';
    h+='<span class="tag" style="background:var(--grnd);color:var(--grn)">'+r.riskLevel+'</span></div>';
    h+='<div id="plist-'+i+'"></div>';
    h+='</div>';
  });
  $('predict-list').innerHTML=h;
  storedResults.forEach(function(r,i){
    if(!r) return;
    renderPrediction(r,'plist-'+i);
  });
}

// MANUAL PREDICT
// ================================================================
function manualPredict(){
  var hn=v('m-hn'),an=v('m-an');
  var hr=parseInt(v('m-hr'))||50, ar=parseInt(v('m-ar'))||50;
  var oh=parseFloat(v('m-oh'))||2, od=parseFloat(v('m-od'))||3.5, oa=parseFloat(v('m-oa'))||3;
  var ou=parseFloat(v('m-ou'))||2.5;
  var hStyle=v('m-hs'), aStyle=v('m-as');
  var injRaw=v('m-inj'), envRaw=v('m-env');

  // Build match data
  var m={
    home_team:{name:hn,elo:1800-(hr-1)*5,fifa_rank:hr,xg_for:2-hr*0.01,xg_against:0.6+hr*0.005,
      recent_form:(v('m-hf')||'W,W,D,W,W').split(','),streak:2,tactical_style:hStyle},
    away_team:{name:an,elo:1800-(ar-1)*5,fifa_rank:ar,xg_for:2-ar*0.01,xg_against:0.6+ar*0.005,
      recent_form:(v('m-af')||'W,L,D,W,W').split(','),streak:1,tactical_style:aStyle},
    odds:{home:oh,draw:od,away:oa,over_under:ou,over_odds:1.9,under_odds:1.9},
    home_injuries:[],away_injuries:[],is_derby:false,is_must_win:false
  };

  // Parse injuries
  if(injRaw){
    if(injRaw.indexOf('主队')>=0||injRaw.indexOf(hn)>=0){
      var names=injRaw.split(/[,，、]/);
      names.forEach(function(n){if(n.trim()) m.home_injuries.push({player:{name:n.trim()},is_out:true})});
    }
    if(injRaw.indexOf('客队')>=0||injRaw.indexOf(an)>=0){
      var names=injRaw.split(/[,，、]/);
      names.forEach(function(n){if(n.trim()) m.away_injuries.push({player:{name:n.trim()},is_out:true})});
    }
  }

  // Parse environment
  if(envRaw){
    m.environment={weather:'clear',temperature:22,wbgt:18,altitude_diff:0,travel_distance:0,timezone_diff:0,arrival_days:3,rest_diff:0};
    if(envRaw.indexOf('雨')>=0) m.environment.weather='rain';
    if(envRaw.indexOf('暴雨')>=0||envRaw.indexOf('雷')>=0) m.environment.weather='heavy_rain';
    var tMatch=envRaw.match(/(\d+)\s*[°C℃度]/);
    if(tMatch) m.environment.temperature=parseInt(tMatch[1]);
    if(m.environment.temperature>=30) m.environment.wbgt=28;
  }

  var r=computePrediction(m);
  renderPrediction(r,'manual-result');
  toast('预测完成');
}

var learnRecords=JSON.parse(localStorage.getItem('gto_learn')||'[]');

function recordLearn(){
  var match=v('l-match'),score=v('l-score'),date=v('l-date');
  if(!match||!score){toast('请填写比赛和比分');return}
  var parts=score.split('-');
  if(parts.length!==2){toast('比分格式错误，请用 2-0 格式');return}
  var hg=parseInt(parts[0]), ag=parseInt(parts[1]);
  var result=hg>ag?'H':(hg===ag?'D':'A');

  // Find matching prediction
  var pred=null;
  storedResults.forEach(function(r){
    if(r&&(r.home+' vs '+r.away)===match) pred=r;
  });

  var record={
    match:match,date:date||new Date().toISOString().split('T')[0],
    actual_home:hg,actual_away:ag,result:result,total_goals:hg+ag
  };

  if(pred){
    var act=(result==='H'?[1,0,0]:result==='D'?[0,1,0]:[0,0,1]);
    record.pred_home=pred.probability.home;
    record.pred_draw=pred.probability.draw;
    record.pred_away=pred.probability.away;
    record.brier=(Math.pow(pred.probability.home-act[0],2)+Math.pow(pred.probability.draw-act[1],2)+Math.pow(pred.probability.away-act[2],2))/3;
    record.pred_correct=(result==='H'&&pred.probability.home>pred.probability.draw&&pred.probability.home>pred.probability.away)||
      (result==='D'&&pred.probability.draw>pred.probability.home&&pred.probability.draw>pred.probability.away)||
      (result==='A'&&pred.probability.away>pred.probability.home&&pred.probability.away>pred.probability.draw);
  }

  learnRecords.push(record);
  localStorage.setItem('gto_learn',JSON.stringify(learnRecords));
  logPanel('learn-log','记录: '+match+' '+score+' (结果:'+result+')'+(pred?(' Brier:'+record.brier.toFixed(4)):''),'grn');
  toast('✅ 已记录: '+match+' '+score);
}

function showLearnStats(){
  if(!learnRecords.length){toast('暂无学习记录');return}
  var h='<div class="card"><div class="card-header"><h3>学习统计</h3></div>';
  h+='<div class="factor-grid">';
  h+='<div class="factor-item"><div class="f-label">总记录</div><div class="f-value">'+learnRecords.length+' 场</div></div>';

  var withPred=learnRecords.filter(function(r){return r.pred_home!==undefined});
  if(withPred.length){
    var correct=withPred.filter(function(r){return r.pred_correct}).length;
    var avgBrier=withPred.reduce(function(s,r){return s+r.brier},0)/withPred.length;
    h+='<div class="factor-item info"><div class="f-label">方向准确率</div><div class="f-value">'+(correct/withPred.length*100).toFixed(1)+'% ('+correct+'/'+withPred.length+')</div></div>';
    h+='<div class="factor-item info"><div class="f-label">平均Brier</div><div class="f-value">'+avgBrier.toFixed(4)+'</div></div>';
  }
  h+='</div>';

  if(withPred.length>=5){
    h+='<div style="font-size:.7rem;color:var(--amb);margin-top:8px">💡 已累积'+withPred.length+'场预测记录，建议进行权重校准</div>';
  }
  h+='</div>';
  $('learn-result').innerHTML=h;
}

// ================================================================
// INIT
// ================================================================
$('s-date').value=new Date().toISOString().split('T')[0];
$('l-date').value=new Date().toISOString().split('T')[0];

// Auto-show learn stats if records exist
if(learnRecords.length) showLearnStats();

console.log('⚽ GTO-GameFlow Tactical Command Center ready.');
console.log('   Scout → Predict → Learn');
console.log('   Records stored: '+learnRecords.length);
</script>
